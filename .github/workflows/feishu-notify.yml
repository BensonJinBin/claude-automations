name: Feishu Notify

on:
  push:
    paths:
      - 'daily-news/**.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send to Feishu
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FILE="daily-news/${DATE}.json"

          # Build rich text content array
          CONTENT=$(jq -c '[.news[] | [
            {"tag": "text", "text": ("【" + (.title) + "】\n")},
            {"tag": "text", "text": ((.summary) + "\n")},
            {"tag": "a", "text": "原文链接", "href": .url},
            {"tag": "text", "text": "\n\n"}
          ]] | [.[] | .[]]' "$FILE")

          # Wrap into feishu post format
          BODY=$(jq -n \
            --arg date "$DATE" \
            --argjson content "$CONTENT" \
            '{
              msg_type: "post",
              content: {
                post: {
                  zh_cn: {
                    title: ("📰 AI 日报｜" + $date),
                    content: [$content]
                  }
                }
              }
            }')

          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "$BODY"

