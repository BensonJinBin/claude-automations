name: Feishu Notify

on:
  push:
    paths:
      - 'daily-news/archive/**.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send to Feishu
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FILE="daily-news/archive/${DATE}.json"

          # Validate JSON and filter stale news (older than 2 days)
          FILE="$FILE" python3 << 'PYEOF'
import json, re, sys
from datetime import date, timedelta

file_path = __import__('os').environ['FILE']
with open(file_path) as f:
    try:
        data = json.load(f)
    except json.JSONDecodeError as e:
        print(f"ERROR: Invalid JSON - {e}")
        print("Check for unescaped quotes in title/summary fields.")
        sys.exit(1)

file_date = date.fromisoformat(data['date'])
cutoff = file_date - timedelta(days=2)

def get_item_date(item, file_year, file_month, fallback):
    # Try date field first
    if 'date' in item:
        return date.fromisoformat(item['date'])
    # Try URL pattern /YYYY/MM/DD/
    m = re.search(r'/(\d{4})/(\d{2})/(\d{2})/', item.get('url', ''))
    if m:
        return date(int(m.group(1)), int(m.group(2)), int(m.group(3)))
    # Try Chinese date in summary
    m = re.search(r'(\d{1,2})月(\d{1,2})日', item.get('summary', ''))
    if m:
        month, day = int(m.group(1)), int(m.group(2))
        year = file_year if month <= file_month else file_year - 1
        return date(year, month, day)
    return fallback

kept = [
    item for item in data['news']
    if get_item_date(item, file_date.year, file_date.month, file_date) >= cutoff
]

stale = len(data['news']) - len(kept)
if stale:
    print(f"Filtered {stale} stale news item(s) (cutoff: {cutoff})")

data['news'] = kept
with open(file_path, 'w') as f:
    json.dump(data, f, ensure_ascii=False, indent=2)
print(f"Ready: {len(kept)} news items for {file_date}")
PYEOF

          # Build rich text content array
          CONTENT=$(jq -c '[.news[] | [
            {"tag": "text", "text": ("【" + (.title) + "】\n")},
            {"tag": "text", "text": ((.summary) + "\n")},
            {"tag": "a", "text": "原文链接", "href": .url},
            {"tag": "text", "text": "\n\n"}
          ]] | [.[] | .[]]' "$FILE")

          # Wrap into feishu post format
          BODY=$(jq -n \
            --arg date "$DATE" \
            --argjson content "$CONTENT" \
            '{
              msg_type: "post",
              content: {
                post: {
                  zh_cn: {
                    title: ("📰 AI 日报｜" + $date),
                    content: [$content]
                  }
                }
              }
            }')

          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "$BODY"

